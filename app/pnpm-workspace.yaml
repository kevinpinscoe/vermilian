nodeLinker: hoisted
blockExoticSubdeps: false
allowBuilds:
  electron-winstaller: true
  esbuild: true
  # Native deps of @electron-forge/maker-dmg (macOS .dmg). pnpm 11 blocks their
  # build scripts by default, which exits non-zero (ERR_PNPM_IGNORED_BUILDS).
  fs-xattr: true
  macos-alias: true
# Pin the whole tree to one Vite 6 so vitest and @electron-forge/plugin-vite
# resolve the same copy (a floating range let vitest pull a nested pre-release
# Vite whose SSR transform broke: ReferenceError: __vite_ssr_exportName__).
# Vite >= 6.4.3 also clears the vite/esbuild Dependabot advisories
# (GHSA-fx2h-pf6j-xcff, GHSA-v6wh-96g9-6wx3, GHSA-4w7w-66w2-5vf9) and drags
# esbuild >= 0.25.0 (GHSA-67mh-4wv8-2f99). @electron-forge/plugin-vite@7.11 has
# no vite peer/dep pin and @vitejs/plugin-react@4.7 supports vite 6.
overrides:
  vite: ^6.4.3
  esbuild: ^0.25.0
  # Security (Dependabot) — pin patched versions of transitive dev-toolchain
  # deps. None of these ship in the packaged app (electron-forge bundles only
  # `dependencies`); they are build/test/CLI tooling only.
  undici: ^7.28.0
  tmp: ^0.2.6
  tar: ^7.5.18
  js-yaml: ^4.2.0
  "@babel/core": ^7.29.6
  postcss: ^8.5.10
  fast-uri: ^3.1.4
  # brace-expansion is vulnerable on both its 1.x and 2.x lines (GHSA-3jxr-9vmj-r5cp);
  # pin each major to its patched release rather than forcing one major everywhere.
  "brace-expansion@1": ^1.1.16
  "brace-expansion@2": ^2.1.2
